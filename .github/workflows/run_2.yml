name: BubbleMaps Analysis - Run 2 (Append)

on:
  schedule:
    - cron: '0 6 * * *'  # 06:00 UTC (13:00 UTC+7)
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install requests gspread google-auth pyjwt python-dotenv

      - name: Create credentials.json
        run: |
          echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

      - name: Run Cluster Analysis
        env:
          TIME_LIMIT_HOURS: '5.5'
          WRITE_MODE: 'append'
        run: python cluster.py
