name: Token Analysis - Run 1 (Clear)

on:
  schedule:
    - cron: '0 0 * * *' # 00:00 UTC (07:00 UTC+7)
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      TIME_LIMIT_HOURS: '5.5'
      WRITE_MODE: 'clear'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests gspread google-auth pyjwt python-dotenv

      - name: Write Secrets to Files
        env:
          GCP_CREDS: ${{ secrets.GCP_CREDENTIALS_JSON }}
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE }}
        run: |
          python -c "import os; open('credentials.json', 'w').write(os.environ.get('GCP_CREDS', ''))"
          python -c "import os; open('.env', 'w').write(os.environ.get('ENV_FILE_CONTENT', ''))"

      - name: Run Cluster Analysis
        run: python cluster.py
