name: Token Analysis - Run 1 (Clear)

on:
  schedule:
    - cron: '0 0 * * *' # 00:00 UTC (07:00 UTC+7)
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    env:
      TIME_LIMIT_HOURS: '5.5'
      WRITE_MODE: 'clear'
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests gspread google-auth pyjwt python-dotenv

      - name: Create credentials.json
        run: echo '${{ secrets.GCP_CREDENTIALS }}' > credentials.json

      - name: Create .env
        run: echo '${{ secrets.ENV_FILE }}' > .env

      - name: Run Cluster Analysis
        run: python cluster.py
